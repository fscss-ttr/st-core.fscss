<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>st-core · Expenses Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/fscss@1.1.24/exec.min.js" async></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  
  <style>
    /* ─── PAGE SHELL ──────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html,
    body {
      height: 100%;
      background: #0a0a0f;
      font-family: 'DM Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* subtle grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(196, 168, 255, .04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(196, 168, 255, .04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    
    .page {
      width: 100%;
      max-width: 420px;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    /* header */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .page-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: #fff;
      letter-spacing: -.5px;
    }
    
    .page-badge {
      font-size: 10px;
      font-weight: 500;
      color: #c4a8ff;
      background: rgba(196, 168, 255, .12);
      border: 1px solid rgba(196, 168, 255, .2);
      padding: 4px 8px;
      border-radius: 99px;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    
    /* ─── FSCSS st-core ───────────────────────────────────────── */
    @import((*) from "./st-core.fscss") 
    @st-root()
    @st-container(body)
    .wrapper {
      flex-direction: column;
      gap: 16px;
      width: 100%;
    }
    
    @st-chart-fill(.chart-fill) @st-chart-line(.chart-line) @st-chart-dot(.chart-dot, 70, 60) .chart {
      width: 100%;
      height: 200px;
      border-radius: 20px;
      position: relative;
      overflow: hidden;
      background: var(--st-surface);
      border: 1px solid rgba(255, 255, 255, .06);
      
      @st-chart-points(20, 25, 21, 37, 30, 60, 27, 50)
    }
    
    @st-phone(.wrapper)
    .chart-line {
      @st-chart-line-width(2px);
      filter: drop-shadow(0 0 8px var(--st-accent));
    }
    
    .chart-fill {
      opacity: .85;
    }
    
    .chart-dot {
      position: relative;
      overflow: visible;
      --st-accent: #c4a8ff;
    }
    
    .chart-dot .tooltip {
      background: var(--st-accent);
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 700;
      color: #0a0a0f;
      border-radius: 8px;
      position: absolute;
      top: -40px;
      left: -26px;
      white-space: nowrap;
      font-family: 'DM Mono', monospace;
    }
    
    .chart-dot::before {
      content: '';
      width: 10px;
      height: 10px;
      background: var(--st-accent);
      transform: rotate(45deg);
      position: absolute;
      top: -18px;
      left: 2px;
    }
    
    @st-stat-card(.stat-card) @st-chart-axis-x(.x-axis) @st-chart-axis-y(.y-axis) @st-chart-grid(.chart-grid, 10, 7) .chart-fill, .chart-line {
      height: 100%;
      transition: clip-path .9s cubic-bezier(.4, 0, .2, 1);
    }
    
    .chart-dot {
      transition: all 0.9s cubic-bezier(.4, 0, .2, 1);
    }
    
    /* stat card tweaks */
    .stat-card {
      border: 1px solid rgba(255, 255, 255, .07);
      border-radius: 16px !important;
    }
    
    /* ─── BUTTON ─────────────────────────────────────────────── */
    .update-btn {
      align-self: flex-start;
      background: transparent;
      color: #c4a8ff;
      padding: 10px 20px;
      border-radius: 10px;
      border: 1.5px solid rgba(196, 168, 255, .4);
      font-weight: 500;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: .5px;
      cursor: pointer;
      transition: background .2s, border-color .2s, color .2s;
    }
    
    .update-btn:hover {
      background: rgba(196, 168, 255, .1);
      border-color: #c4a8ff;
      color: #fff;
    }
    
    .update-btn:active {
      background: rgba(196, 168, 255, .2);
    }
    
    /* ─── FOOTER ─────────────────────────────────────────────── */
    .page-footer {
      font-size: 10px;
      color: rgba(255, 255, 255, .2);
      letter-spacing: .5px;
      text-align: center;
      text-transform: uppercase;
    }
    
    .page-footer span {
      color: rgba(196, 168, 255, .4);
    }
  </style>
</head>

<body>
  
  <div class="page">
    
    <div class="page-header">
      <div class="page-title">Analytics</div>
      <div class="page-badge">st-core demo</div>
    </div>
    
    <!-- ── FSCSS MARKUP ── -->
    <div class="wrapper">
      
      <div class="stat-card">
        <div class="st-stat-label">TOTAL EXPENSES</div>
        <div class="st-stat-value">$1,326.03</div>
        <div class="st-stat-delta up">+5.1% vs last week</div>
      </div>
      
      <div class="chart">
        <div class="chart-fill"></div>
        <div class="chart-line"></div>
        <div class="chart-dot"><span class="tooltip">$405.67</span></div>
        <div class="chart-grid"></div>
        <div class="y-axis">
          <span>0</span><span>10</span><span>20</span><span>30</span>
          <span>40</span><span>50</span><span>60</span><span>70</span>
          <span>80</span><span>90</span><span>100</span>
        </div>
      </div>
      
      <div class="x-axis days">
        <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span>
        <span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
      </div>
      
    </div>
    
    <button class="update-btn">↻ Update chart</button>
    
    <div class="page-footer">Powered by <span>FSCSS</span> · Figsh Digital</div>
    
  </div>
  
  <script>
    const chartFill = document.querySelector(".chart-fill");
const chartLine = document.querySelector(".chart-line");
const chartDot = document.querySelector('.chart-dot');
const axisY = document.querySelector(".y-axis");

const updateBtn = document.querySelector(".update-btn");

function normalize(n) {
  // Returns the percentage from the top (e.g., 80 becomes 20%)
  return (100 - n) + '%';
}

/* st-core.fscss chart x axis */
const xStops = ['0%', '14%', '28%', '42%', '57%', '71%', '85%', '100%'];

function randomUpdate() {
  // 1. Generate 8 random data points
  const points = Array.from({ length: 8 }, () => Math.floor(Math.random() * 80) + 10);
  
  // 2. Find the peak
  const highest = Math.max(...points);
  const highestIdx = points.indexOf(highest);
  
  // 3. Build CSS variables (Mapping p1 to index 0, p2 to index 1, etc.)
  // This matches: 0% -> p1, 14% -> p2...
  const newChart = points.map((v, i) =>
    `--st-p${i + 1}: ${normalize(v)};`
  ).join(' ');
  
  chartLine.style.cssText = newChart;
  chartFill.style.cssText = newChart;
  
  // 4. Move the dot
  // We use the same index (highestIdx) for both X and Y
  chartDot.style.top = normalize(highest);
  chartDot.style.left = xStops[highestIdx]; 
  
  // Update tooltip text
  chartDot.querySelector('.tooltip').textContent = `$${(highest * 5.5).toFixed(2)}`;
}

updateBtn.addEventListener("click", randomUpdate);

axisY.addEventListener("click", e=>{
  if(e.target.parentElement.classList.contains("y-axis")){
    const rect = e.currentTarget.getBoundingClientRect();
  
  // 1. Get the horizontal position relative to the div
  const x = e.clientX - rect.left; 
  
  // 2. Calculate the percentage
  const xper = ((x / rect.width) * 100).toFixed(2);

  const yper = +e.target.textContent;
  
  chartDot.style.top = normalize(yper);
chartDot.style.left = `${xper}%`;

  chartDot.querySelector('.tooltip').textContent = `$${(yper * 5.5). toFixed(2)}`;
  
  
  console.log(yper)
    console.log(xper);
  } 
})

  </script>
</body>

</html>
