<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>st-core.fscss — Multi Chart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<!-- fscss runtime -->
<script src="https://cdn.jsdelivr.net/npm/fscss@1.1.24/exec.min.js" async></script>
<!-- style.fscss -->
<link type="style.fscss" href="./demo/src/multi-chart.fscss">
</head>
<body>

<div class="card">

  <!-- Header -->
  <div class="card-header">
    <div>
      <div class="card-title">Weekly Performance</div>
      <div class="card-sub">Apr 5 – Apr 11, 2026</div>
    </div>
    <span class="badge">LIVE</span>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item">
      <span class="legend-dot dot-teal"></span> Revenue
    </div>
    <div class="legend-item">
      <span class="legend-dot dot-amber"></span> Sessions
    </div>
    <div class="legend-item">
      <span class="legend-dot dot-violet"></span> Signups
    </div>
  </div>

  <!-- Chart + Y-axis -->
  <div class="chart-wrap">

    <div class="chart">
      <div class="chart-line line-1"></div>
      <div class="chart-line line-2"></div>
      <div class="chart-line line-3"></div>
      <div class="chart-grid"></div>
          <div class="y-axis">
      <span>0</span>
      <span>20</span>
      <span>40</span>
      <span>60</span>
      <span>80</span>
      <span>100</span>
    </div>

    </div>

  </div>

  <!-- X Axis -->
  <div class="x-axis">
    <span>Sun</span>
    <span>Mon</span>
    <span>Tue</span>
    <span>Wed</span>
    <span>Thu</span>
    <span>Fri</span>
    <span>Sat</span>
    <span>Sun</span>
  </div>

  <div class="divider"></div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-cell">
      <div class="stat-label">Revenue</div>
      <div class="stat-value">66</div>
      <div class="stat-delta up">↑ +12%</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Sessions</div>
      <div class="stat-value">80</div>
      <div class="stat-delta up">↑ +34%</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Signups</div>
      <div class="stat-value">70</div>
      <div class="stat-delta dn">↓ −5%</div>
    </div>
  </div>

</div>

</body>
</html>
